# ─────────────────────────────────────────────────────────────────────────────
# Prometheus スクレイプ設定
#
# スクレイプ対象:
#   1. orchestration-platform  → host.docker.internal:9100/metrics
#      (プラットフォーム本体が ts-node で起動する場合 extra_hosts 経由)
#   2. opa                     → opa:8181/metrics  (OPA ネイティブ Prometheus)
#   3. nats                    → nats:8222/metrics  (NATS 2.10+ モニタリング)
#   4. vector                  → vector:8686/metrics (Vector 内部メトリクス)
#
# ホットリロード:
#   curl -X PUT http://localhost:9090/-/reload
# ─────────────────────────────────────────────────────────────────────────────
global:
  scrape_interval:     15s   # 全ジョブのデフォルト収集間隔
  evaluation_interval: 15s   # ルール評価間隔
  external_labels:
    environment: "local"
    platform:    "orchestration"

scrape_configs:
  # ── 1. プラットフォーム本体 (Temporal Worker + Gateway) ──────────────────
  - job_name: "orchestration-platform"
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          service: "platform"
    metrics_path: /metrics
    scrape_interval: 10s   # ワークフロー指標は細かく収集

  # ── 2. OPA ──────────────────────────────────────────────────────────────
  # --diagnostic-addr=0.0.0.0:8282 で公開される /metrics をスクレイプ
  - job_name: "opa"
    static_configs:
      - targets: ["opa:8282"]
        labels:
          service: "opa"
    metrics_path: /metrics

  # ── 3. NATS (JetStream モニタリング) ──────────────────────────────────
  # NATS 2.10 は /metrics エンドポイントを 8222 で公開する
  - job_name: "nats"
    static_configs:
      - targets: ["nats:8222"]
        labels:
          service: "nats"
    metrics_path: /metrics

  # ── 4. Vector ────────────────────────────────────────────────────────────
  - job_name: "vector"
    static_configs:
      - targets: ["vector:8686"]
        labels:
          service: "vector"
    metrics_path: /metrics

  # ── 5. Prometheus 自身 ────────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
