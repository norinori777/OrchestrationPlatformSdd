services:
  # 1. Database (Temporalと業務データの両方で使用可能)
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_DB=temporal
    networks:
      - saas-platform
    ports:
      - "5432:5432"

  # 2. Temporal Server (Admin Tools, Web UI含む)
  temporal:
    image: temporalio/auto-setup:1.22
    container_name: temporal
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    depends_on:
      - postgres
    networks:
      - saas-platform
    ports:
      - "7233:7233" # gRPC (SDK用)

  # 3. Temporal Web UI
  temporal-ui:
    image: temporalio/ui:latest
    container_name: temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    networks:
      - saas-platform
    ports:
      - "8080:8080" # Web UI用

  # 4. NATS (JetStream有効 - メッセージの永続化)
  nats:
    image: nats:2.10-alpine
    container_name: nats
    command: ["-js"] # JetStreamを有効化
    networks:
      - saas-platform
    ports:
      - "4222:4222" # クライアント通信
      - "8222:8222" # モニタリング用

  # 5. Open Policy Agent (OPA)
  opa:
    image: openpolicyagent/opa:latest
    container_name: opa
    # --diagnostic-addr: /health と /metrics を別ポート (8282) で公開
    # Prometheus は 8282/metrics をスクレイプする
    command: ["run", "--server", "--log-level=info", "--addr=0.0.0.0:8181", "--diagnostic-addr=0.0.0.0:8282"]
    networks:
      - saas-platform
    ports:
      - "8181:8181" # REST API
      - "8282:8282" # /metrics, /health (Prometheus スクレイプ先)

  # 6. Redis (クォータキャッシュ / サービス間フラグ共有)
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - saas-platform
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # 7. Prometheus (メトリクス収集・時系列DB)
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"      # PUT /-/reload でホットリロード可能
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - saas-platform
    ports:
      - "9090:9090" # Prometheus UI / API
    extra_hosts:
      - "host.docker.internal:host-gateway" # ホスト上の platform メトリクスサーバーを参照

  # 8. Vector (ログ集約・整形パイプライン)
  vector:
    image: timberio/vector:0.38.0-alpine
    container_name: vector
    command: ["--config", "/etc/vector/vector.yaml"]
    volumes:
      - ./config/vector.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Docker ログ収集用
    networks:
      - saas-platform
    ports:
      - "8686:8686" # Vector API (監視・診断)
      - "9001:9001" # HTTP ログ受信エンドポイント (platform → Vector)
    depends_on:
      - postgres

networks:
  saas-platform:
    driver: bridge

volumes:
  redis-data:
    driver: local
  prometheus-data:
    driver: local
